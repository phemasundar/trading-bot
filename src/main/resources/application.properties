## Server Configuration
server.port=8080
spring.application.name=Trading Bot

## JSON Configuration
spring.jackson.serialization.indent-output=true

## Schwab API Configuration
schwab.refresh-token=${REFRESH_TOKEN:}
schwab.app-key=${APP_KEY:}
schwab.app-secret=${APP_SECRET:}

## FinnHub API Configuration
finnhub.api-key=${FINNHUB_API_KEY:}

## FMP API Configuration
fmp.api-key=${FMP_API_KEY:}

## Telegram Configuration
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
telegram.enabled=${TELEGRAM_ENABLED:true}

## Supabase Configuration
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

## Google Sheets Configuration
google.sheets.spreadsheet-id=${GOOGLE_SPREADSHEET_ID:}
google.sheets.enabled=${GOOGLE_SHEETS_ENABLED:true}
supabase.enabled=${SUPABASE_ENABLED:true}

## Allowed user emails (comma-separated)
allowed.emails=${ALLOWED_EMAILS:}

logging.file.name=logs/trading-bot.log