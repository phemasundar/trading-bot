## Server Configuration
server.port=8080
spring.application.name=Trading Bot

## JSON Configuration
spring.jackson.serialization.indent-output=true

## Supabase Configuration (loaded from environment variables in production)
## For local development, set these in your IDE run config or a local .env file
supabase.url=${SUPABASE_URL:}
supabase.anon.key=${SUPABASE_ANON_KEY:}
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY:}

## Allowed user emails (comma-separated). If set, only these users can access /api/* endpoints.
## Leave empty to allow any authenticated Supabase user.
allowed.emails=${ALLOWED_EMAILS:}