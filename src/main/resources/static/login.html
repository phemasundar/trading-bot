<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot — Sign In</title>
    <meta name="description" content="Sign in to access the Trading Bot dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">📊</div>
                <h1 class="login-title">Trading Bot</h1>
                <p class="login-subtitle">Sign in to continue</p>
            </div>

            <!-- Error message area -->
            <div id="login-error" class="login-error" style="display: none;"></div>
            <!-- Loading spinner -->
            <div id="login-loading" class="login-loading" style="display: none;">
                <div class="login-spinner"></div>
                <span>Signing in...</span>
            </div>

            <!-- OAuth Buttons -->
            <div class="login-buttons" id="login-buttons">
                <button class="btn-oauth btn-google" id="btn-google" onclick="signInWithGoogle()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>

                <button class="btn-oauth btn-apple" id="btn-apple" onclick="signInWithApple()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                    </svg>
                    <span>Continue with Apple</span>
                </button>
            </div>

            <p class="login-footer">Invite-only access · Contact admin for an account</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;

        async function initLogin() {
            try {
                // Fetch Supabase config from backend
                const res = await fetch('/api/auth/config');
                const config = await res.json();
                supabaseClient = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

                // Check if user is already logged in
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    window.location.href = '/';
                    return;
                }

                // Handle OAuth callback (token in URL hash)
                supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' && session) {
                        // Verify the user is authorized by calling the backend
                        verifyAccess(session.access_token);
                    }
                });
            } catch (e) {
                showError('Failed to initialize authentication. Try refreshing.');
                console.error('Auth init failed:', e);
            }
        }

        async function verifyAccess(token) {
            showLoading(true);
            try {
                const res = await fetch('/api/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    window.location.href = '/';
                } else if (res.status === 403) {
                    const data = await res.json();
                    try { await supabaseClient.auth.signOut(); } catch(e) {}
                    localStorage.clear();
                    sessionStorage.clear();
                    showError(data.error || 'You are not authorized to access this application.');
                    showLoading(false);
                } else {
                    // Backend threw 401 or 500 — Do NOT redirect to /
                    try { await supabaseClient.auth.signOut(); } catch(e) {}
                    localStorage.clear();
                    sessionStorage.clear();
                    showError('Authentication failed. The token is invalid or expired.');
                    showLoading(false);
                }
            } catch (e) {
                showError('Network error. Could not verify authentication.');
                try { await supabaseClient.auth.signOut(); } catch(err) {}
                localStorage.clear();
                sessionStorage.clear();
                showLoading(false);
            }
        }

        async function signInWithGoogle() {
            if (!supabaseClient) return showError('Auth not initialized. Please refresh.');
            showLoading(true);
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/login.html'
                }
            });
            if (error) {
                showError(error.message);
                showLoading(false);
            }
        }

        async function signInWithApple() {
            if (!supabaseClient) return showError('Auth not initialized. Please refresh.');
            showLoading(true);
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'apple',
                options: {
                    redirectTo: window.location.origin + '/login.html'
                }
            });
            if (error) {
                showError(error.message);
                showLoading(false);
            }
        }

        function showError(msg) {
            const el = document.getElementById('login-error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showLoading(show) {
            document.getElementById('login-loading').style.display = show ? 'flex' : 'none';
            document.getElementById('login-buttons').style.display = show ? 'none' : 'flex';
        }

        document.addEventListener('DOMContentLoaded', initLogin);
    </script>
</body>

</html>
