<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot — Execute Strategy</title>
    <meta name="description" content="Execute custom trading strategies with configurable filters">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Mobile menu toggle -->
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                Trading Bot
                <small>Automated Systems</small>
            </div>
            <a href="/" class="nav-link">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="/execute.html" class="nav-link active">
                <span class="nav-icon">▶️</span>
                <span>Execute Strategy</span>
            </a>
            <a href="/config.html" class="nav-link">
                <span class="nav-icon">⚙️</span>
                <span>Config</span>
            </a>
        </nav>
        <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <main class="main-content">
            <h1 class="page-title">Execute Strategy</h1>
            <p class="page-subtitle">Run custom strategies with configurable filters</p>

            <!-- Config Panel -->
            <div class="card">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Strategy Type *</label>
                        <select id="strategy-type" class="form-select">
                            <option value="">Select a strategy...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Alias (optional)</label>
                        <input type="text" id="alias-input" class="form-input" placeholder="e.g., My PCS Test">
                    </div>
                </div>

                <div id="strategy-templates" style="margin-top: 16px;"></div>

                <div class="form-grid" style="margin-top: 16px;">
                    <div class="form-group">
                        <label class="form-label">Securities File (comma-separated file names) <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'securitiesFile', 'Securities File')"><svg class="info-icon"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="text" id="securities-file-input" class="form-input"
                            placeholder="portfolio, top100, tracking, bullish, 2026">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Securities (comma-separated tickers)</label>
                        <input type="text" id="securities-input" class="form-input"
                            placeholder="AAPL, MSFT, GOOG, AMZN, META">
                    </div>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">
                    Provide a securities file, inline tickers, or both. File symbols and inline tickers are merged.
                </p>
            </div>

            <!-- Common Filters -->
            <div class="card">
                <h3 style="font-size:0.9rem; margin-bottom:12px; color:var(--text-secondary)">Filters</h3>
                <div class="form-grid" id="filter-form">
                    <div class="form-group">
                        <label class="form-label">Target DTE <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'targetDTE', 'Target DTE')"><svg class="info-icon"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="targetDTE" placeholder="45">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min DTE <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'minDTE', 'Min DTE')"><svg class="info-icon"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="minDTE" placeholder="20">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max DTE <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxDTE', 'Max DTE')"><svg class="info-icon"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxDTE" placeholder="60">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Loss ($) <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxLossLimit', 'Max Loss ($)')"><svg class="info-icon"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxLossLimit" placeholder="500">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Total Debit ($) <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxTotalDebit', 'Max Total Debit ($)')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxTotalDebit" placeholder="1000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Total Credit ($) <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxTotalCredit', 'Max Total Credit ($)')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxTotalCredit" placeholder="2000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min Total Credit ($) <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'minTotalCredit', 'Min Total Credit ($)')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="minTotalCredit" placeholder="50">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min Return on Risk (%) <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'minReturnOnRisk', 'Min Return on Risk (%)')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="minReturnOnRisk" placeholder="10">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min Historical Volatility <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'minHistoricalVolatility', 'Min Historical Volatility')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="minHistoricalVolatility" placeholder="20"
                            step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Break-Even % <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxBreakEvenPercentage', 'Max Break-Even %')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxBreakEvenPercentage" placeholder="5.0"
                            step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Breakeven Delta <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxUpperBreakevenDelta', 'Max Breakeven Delta')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxUpperBreakevenDelta" placeholder="0.30"
                            step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Extrinsic % <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'maxNetExtrinsicValueToPricePercentage', 'Max Extrinsic %')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="maxNetExtrinsicValueToPricePercentage"
                            placeholder="0.5" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Min Extrinsic % <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'minNetExtrinsicValueToPricePercentage', 'Min Extrinsic %')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="minNetExtrinsicValueToPricePercentage"
                            placeholder="0.0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Top Trades Count <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'topTradesCount', 'Top Trades Count')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="number" class="form-input" data-filter="topTradesCount" placeholder="3">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Include Only <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'includeOnly', 'Include Only')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="text" class="form-input" data-filter="includeOnly" placeholder="AAPL, MSFT">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Exclude If <button type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'excludeIf', 'Exclude If')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                        <input type="text" class="form-input" data-filter="excludeIf" placeholder="TSLA, NVDA">
                    </div>
                    <div class="form-group" style="display:flex; align-items:center; gap:8px; padding-top:20px">
                        <input type="checkbox" id="ignore-earnings" data-filter="ignoreEarnings" checked>
                        <label for="ignore-earnings" style="font-size:0.85rem; cursor:pointer">Ignore Earnings <button
                                type="button" class="info-btn"
                                onclick="showFilterHelp(event, 'ignoreEarnings', 'Ignore Earnings')"><svg
                                    class="info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg></button></label>
                    </div>
                    <!-- Strategy-specific filters are injected here -->
                    <div id="specific-filters" class="form-grid" style="grid-column: 1 / -1"></div>
                </div>
            </div>

            <!-- Execute Button -->
            <div class="flex gap-sm items-center mb-md">
                <button class="btn btn-primary" onclick="executeCustom()">
                    ▶ Execute Custom Strategy
                </button>
            </div>

            <!-- Progress -->
            <div class="progress-container" id="custom-progress">
                <div class="progress-bar">
                    <div class="progress-fill" style="width:30%"></div>
                </div>
                <p class="progress-text" id="elapsed-text">Executing...</p>
            </div>

            <!-- Recent Custom Executions -->
            <h3 style="font-size:1rem; margin:24px 0 12px; color:var(--text-secondary)">Recent Custom Executions</h3>
            <div id="custom-results">
                <div class="empty-state">
                    <div class="empty-state-icon">🔬</div>
                    Loading...
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initExecutePage);
    </script>
</body>

</html>
