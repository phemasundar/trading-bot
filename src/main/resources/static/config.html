<!DOCTYPE html>
<html lang="en">

<head>

<body>

        <!-- Sidebar -->
        <nav class="sidebar">

                <small>Automated Systems</small>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-section-title">Options</div>
                <a href="/" class="nav-link">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/execute.html" class="nav-link">
                    <span class="nav-icon">▶️</span>

                </a>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Screeners</div>
                <a href="/screeners.html" class="nav-link">

            </div>
