name: Deploy to Google Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Redeploy daily at 6:00 AM UTC to pick up the latest env vars (e.g. rotated REFRESH_TOKEN)
    - cron: '0 6 * * *'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: trading-bot
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ──────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker to push to Artifact Registry ─────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:latest \
            .

      # ── 6. Push image to Artifact Registry ───────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          # Dynamically assemble the environment variables string.
          # Secrets that are empty/missing in GitHub will be omitted,
          # allowing Spring Boot to fall back to application.properties defaults.
          VARS=""
          
          add_var() {
            # Only add to the string if the value is non-empty
            if [ -n "$2" ]; then
              if [ -z "$VARS" ]; then
                VARS="^|^$1=$2"
              else
                VARS="$VARS|$1=$2"
              fi
            fi
          }
          
          # Map variables from secrets
          add_var "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          add_var "SUPABASE_ANON_KEY" "${{ secrets.SUPABASE_ANON_KEY }}"
          add_var "SUPABASE_SERVICE_ROLE_KEY" "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          add_var "ALLOWED_EMAILS" "${{ secrets.ALLOWED_EMAILS }}"
          add_var "REFRESH_TOKEN" "${{ secrets.REFRESH_TOKEN }}"
          add_var "APP_KEY" "${{ secrets.APP_KEY }}"
          add_var "APP_SECRET" "${{ secrets.APP_SECRET }}"
          add_var "FINNHUB_API_KEY" "${{ secrets.FINNHUB_API_KEY }}"
          add_var "FMP_API_KEY" "${{ secrets.FMP_API_KEY }}"
          add_var "GOOGLE_SPREADSHEET_ID" "${{ secrets.GOOGLE_SPREADSHEET_ID }}"
          add_var "GOOGLE_SHEETS_ENABLED" "${{ secrets.GOOGLE_SHEETS_ENABLED }}"
          add_var "SUPABASE_ENABLED" "${{ secrets.SUPABASE_ENABLED }}"
          add_var "TELEGRAM_BOT_TOKEN" "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          add_var "TELEGRAM_CHAT_ID" "${{ secrets.TELEGRAM_CHAT_ID }}"
          add_var "TELEGRAM_ENABLED" "${{ secrets.TELEGRAM_ENABLED }}"
          
          # Build list of gcloud arguments
          DEPLOY_CMD="gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 1 \
            --port 8080 \
            --timeout 300 \
            --quiet"
          
          # Append env vars flag if any were added
          if [ -n "$VARS" ]; then
            eval "$DEPLOY_CMD --set-env-vars \"$VARS\""
          else
            eval "$DEPLOY_CMD"
          fi

      # ── 8. Print the service URL ──────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "✅ Deployed successfully!"
          echo "🌐 URL: $URL"
